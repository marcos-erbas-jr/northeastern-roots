{% extends "base.html" %}

{% block title %}
Editar Pedido
{% endblock %}

{% block content %}

<h3>Editar Pedido</h3>

<form method="post"
      action="/pedidos/atualizar/{{pedido.id}}">

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
               Cliente
        </label>

        <select name="cliente_id"
                class="form-control">
            <option value="">Sem cliente</option>
            {% for c in clientes %}
            <option value="{{c.id}}"
                {% if pedido.cliente_id == c.id %} selected {% endif %}>
                {{c.nome}}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
               Status
        </label>

        <select name="status"
                class="form-control">
            <option value="pendente"
                {% if pedido.status == "pendente" %} selected
                {% endif %}>
                Pendente
            </option>
            <option value="preparando"
                {% if pedido.status == "preparando" %}
                    selected
                {% endif %}>
                Preparando
            </option>
            <option value="em rota"
                {% if pedido.status == "Em rota" %}
                    selected
                {% endif %}>
                Em rota
            </option>
            <option value="entregue"
                {% if pedido.status == "entregue" %}
                    selected
                {% endif %}>
                Entregue
            </option>
            <option value="pago"
                {% if pedido.status == "pago" %}
                    selected
                {% endif %}>
                Pago
            </option>
            
            <option value="recusado"
                {% if pedido.status == "recusado" %}
                    selected
                {% endif %}>
                Recusado
            </option>
            <option value="cancelado"
                {% if pedido.status == "cancelado" %}
                    selected
                {% endif %}>
                Cancelado
            </option>
        </select>
    </div>

    <div class="d-flex gap-2">
        <button type="submit"
                class="btn btn-success">
            Atualizar
        </button>
        <a href="/pedidos"
           class="btn btn-secondary">
            Cancelar
        </a>
    </div>

</form>

{% endblock %}
