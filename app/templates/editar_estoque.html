{% extends "base.html" %}

{% block title %}
Editar Estoque
{% endblock %}

{% block content %}

<h3>
Editar Item de Estoque
</h3>

{% if erro %}
<div class="alert alert-danger">
    {{ erro }}
</div>
{% endif %}

<form method="post"
      action="/estoque/atualizar/{{estoque.id}}">

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
            Unidade
        </label>
        <select name="unidade_id"
                class="form-control"
                required>

            {% for un in unidades %}
            <option value="{{un.id}}"
                {% if estoque.unidade_id == un.id %}
                    selected
                {% endif %}>

                {{un.nome}}

            </option>
            {% endfor %}

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
            Ingrediente
        </label>

        <select name="ingrediente_id"
                class="form-control"
                required>

            {% for ing in ingredientes %}
            <option value="{{ing.id}}"
                {% if estoque.ingrediente_id == ing.id %}
                    selected
                {% endif %}>

                {{ing.nome}}

            </option>
            {% endfor %}

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
            Quantidade
        </label>

        <input
            type="number"
            name="quantidade"
            class="form-control"
            required
            min="0"
            step="0.01"
            value="{{estoque.quantidade}}">
    </div>

    <div class="d-flex gap-2">

        <button type="submit"
                class="btn btn-success">
            Atualizar
        </button>

        <a href="/estoque"
           class="btn btn-secondary">

            Cancelar

        </a>
    </div>

</form>

{% endblock %}
