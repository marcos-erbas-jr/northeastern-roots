<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Painel{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/estilo.css">
</head>

<body>
<div class="d-flex flex-column align-items-center">
    <div style="width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="m-0">Raízes do Nordeste</h1>
            <a href="/logout" class="btn btn-warning">Sair</a>
        </div>

        <ul class="nav nav-tabs">

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/painel">Início</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/usuarios">Usuarios</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/unidades">Unidades</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/cardapio">Cardápio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/estoque">Estoque</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/pedidos">Pedidos</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/clientes">Clientes</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" style="color: rgb(233, 212, 198);" href="/promocao">Promoção</a>
            </li>

        </ul>

        <div class="mt-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
