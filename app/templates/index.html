<!DOCTYPE html>
<html lang="pt-br">
      <head>
        <meta charset="UTF-8">
        <title>Página Inicial</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/estilo.css">
        
        
      </head>
    <body>
      <div class="d-flex flex-column align-items-center">
        <div style="width: 800px;">
          <div class="d-flex justify-content-between align-items-center mb-3">

            <h1 class="m-0">Raízes do Nordeste</h1>

            <a href="/login" class="btn btn-warning">Entrar</a>

          </div>


          <div class="d-flex flex-column justify-content-center align-items-center vh-100 text-center">
            <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
              <div class="carousel-inner">

                <div class="carousel-item active">
                  <img src="/static/img/acaraje.jpg" class="d-block w-100" alt="Comida 1">
                </div>

                <div class="carousel-item">
                  <img src="/static/img/cuscuz.jpg" class="d-block w-100" alt="Comida 2">
                </div>

                <div class="carousel-item">
                  <img src="/static/img/moqueca.jpg" class="d-block w-100" alt="Comida 3">
                </div>

                <div class="carousel-item">
                  <img src="/static/img/tapioca.jpg" class="d-block w-100" alt="Comida 4">
                </div>

                <div class="carousel-item">
                  <img src="/static/img/vatapa.jpg" class="d-block w-100" alt="Comida 5">
                </div>
              </div>
            </div>
            <div class="mt-4" style="width: 300px;">
              <select id="unidadeSelect" class="form-control mb-2">
                <option value="">Escolha a unidade</option>
                {% for un in unidades %}
                  <option value="{{un.id}}">{{un.nome}}</option>
                {% endfor %}
              </select>

              <button class="btn btn-danger w-100" onclick="irParaPedido()">
                Fazer Pedido
              </button>
            </div>
          </div>
         
        
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script>
          function irParaPedido() {
              const unidade = document.getElementById("unidadeSelect").value;

              if (!unidade) {
                  alert("Escolha uma unidade!");
                  return;
              }

              window.location.href = `/restaurante?unidade_id=${unidade}`;
          }
        </script>
    </body>
</html>
