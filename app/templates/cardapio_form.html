{% extends "base.html" %}

{% block title %}
Novo Prato
{% endblock %}

{% block content %}

<h3>Novo prato</h3>

{% if erro %}
<div class="alert alert-danger">
  {{ erro }}
</div>
{% endif %}

<form method="post" action="/cardapio/criar">

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Prato
    </label>

    <input type="text"
           name="nome"
           class="form-control"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Descrição
    </label>

    <input type="text"
           name="descricao"
           class="form-control"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Preço
    </label>

    <input type="number"
           name="preco"
           class="form-control"
           required
           min="0"
           step="0.01">
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Unidade
    </label>

    <select name="unidade_id"
            class="form-control"
            required>

      {% for un in unidades %}
        <option value="{{un.id}}">
          {{un.nome}}
        </option>
      {% endfor %}

    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">
      Criar
    </button>

    <a href="/cardapio" class="btn btn-secondary">
      Cancelar
    </a>
  </div>

</form>

{% endblock %}
