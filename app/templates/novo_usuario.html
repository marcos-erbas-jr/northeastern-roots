{% extends "base.html" %}

{% block title %}
Novo Usuário
{% endblock %}

{% block content %}
<h3>Novo Usuário</h3>

{% if erro %}
<div class="alert alert-danger">
  {{ erro }}
</div>
{% endif %}

<form method="post" action="/usuarios/criar">

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Nome
    </label>

    <input type="text"
           name="nome"
           class="form-control"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Email
    </label>

    <input type="email"
           name="email"
           class="form-control"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Senha
    </label>

    <input type="password"
           name="senha"
           class="form-control"
           required>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Cargo
    </label>

    <select name="role" class="form-control" required>
      <option value="admin">
        Admin
      </option>
      <option value="atendente">
        Atendente
      </option>
      <option value="cozinha">
        Cozinha
      </option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">
      Unidade
    </label>

    <select name="unidade_id"
            class="form-control"
            required>
      {% for un in unidades %}
        <option value="{{un.id}}">
          {{un.nome}}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">
      Criar
    </button>
    <a href="/usuarios" class="btn btn-secondary">
      Cancelar
    </a>
  </div>

</form>

{% endblock %}
