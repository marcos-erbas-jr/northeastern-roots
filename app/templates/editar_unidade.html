{% extends "base.html" %}

{% block title %}
Editar Unidade
{% endblock %}

{% block content %}

<h3>
  Editar Unidade
</h3>

{% if erro %}
<div class="alert alert-danger">
  {{ erro }}
</div>
{% endif %}

<form method="post"
      action="/unidades/atualizar/{{unidade.id}}">

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">Nome</label>
    <input type="text"
           name="nome"
           class="form-control"
           required
           value="{{unidade.nome}}">
  </div>

  <div class="mb-3">
    <label class="form-label" style="color: rgb(233, 212, 198);">Cidade</label>
    <input type="text"
           name="cidade"
           class="form-control"
           required
           value="{{unidade.cidade}}">
  </div>
  <div class="mb-3 form-check">
        <input 
            type="checkbox" 
            class="form-check-input" 
            name="ativo" 
            id="ativo"
            {% if unidade.ativo %}checked{% endif %}>
        <label class="form-check-label" for="ativo" style="color: rgb(233, 212, 198);">
            Ativar
        </label>
    </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-success">
      Atualizar
    </button>

    <a href="/unidades" class="btn btn-secondary">
      Cancelar
    </a>
  </div>

</form>

{% endblock %}
