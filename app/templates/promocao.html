{% extends "base.html" %}

{% block title %}Promoções{% endblock %}

{% block content %}
<h3>Promoções</h3>
<p>Gestão de promoções.</p>

<div class="btn-group">
  <button type="button" class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown" data-display="static" aria-haspopup="true" aria-expanded="false">
    Unidades
  </button>
  <div class="dropdown-menu dropdown-menu-lg-right">
    <button class="dropdown-item" type="button">Unid. Campos</button>
    <button class="dropdown-item" type="button">Another action</button>
    <button class="dropdown-item" type="button">Something else here</button>
  </div>
</div>

<table class="table table-striped table-hover">
  <thead>
    <tr>
      <th scope="col">Nº</th>
      <th scope="col">Prato</th>
      <th scope="col">Preço fixo</th>
      <th scope="col">Desconto</th>
      <th scope="col">Preço Promo.</th>
      <th scope="col">Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <th scope="row">1</th>
      <td>Pizza</td>
      <td>R$25,00</td>
      <td>10%</td>
      <td>R$22,50</td>
      <td>
        <button class="btn btn-primary">Atualizar</button>
        <button class="btn btn-danger">Excluir</button>
      </td>
    </tr>
  </tbody>
</table>
<div class="d-flex gap-2 mt-3">
    <button class="btn btn-success">Criar</button>
</div>

{% endblock %}
