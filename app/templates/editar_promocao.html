{% extends "base.html" %}
{% block title %}
Editar Promoção
{% endblock %}
{% block content %}
<h3>
Editar Promoção
</h3>
{% if erro %}
<div class="alert alert-danger">
    {{ erro }}
</div>
{% endif %}

<form method="post"
      action="/promocao/atualizar/{{promocao.id}}">

    <div class="mb-3">
        <label class="form-label" style="color: rgb(233, 212, 198);">
            Unidade
        </label>

        <select name="unidade_id" class="form-control"  required>

            {% for un in unidades %}
            <option value="{{un.id}}" {% if promocao.unidade_id == un.id %} selected {% endif %}>
                {{un.nome}}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">

        <label class="form-label"
               style="color: rgb(233, 212, 198);">
            Prato
        </label>

        <select name="prato_id" class="form-control" required>
            {% for p in pratos %}
            <option value="{{p.id}}" {% if promocao.prato_id == p.id %} selected {% endif %}>
                {{p.nome}}
            </option>
            {% endfor %}
        </select>

    </div>

    <div class="mb-3">

        <label class="form-label"
               style="color: rgb(233, 212, 198);">
            Desconto (%)
        </label>

        <input
            type="number"
            name="desconto"
            class="form-control"
            required
            min="1"
            max="100"
            step="0.01"
            value="{{promocao.desconto}}">
    </div>

    <div class="mb-3 form-check">
        <input
            type="checkbox"
            class="form-check-input"
            name="ativo"
            id="ativo"
            {% if promocao.ativo %}checked{% endif %}>

        <label class="form-check-label"
               for="ativo"
               style="color: rgb(233, 212, 198);">
            Promoção ativa
        </label>
    </div>

    <div class="d-flex gap-2">
        <button type="submit"
                class="btn btn-success">
            Atualizar
        </button>
        <a href="/promocao"
           class="btn btn-secondary">
            Cancelar
        </a>
    </div>
</form>

{% endblock %}
