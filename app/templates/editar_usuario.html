{% extends "base.html" %}

{% block title %}
Editar Usuário
{% endblock %}

{% block content %}
<h3>Editar Usuário</h3>

{% if erro %}
<div class="alert alert-danger">
  {{ erro }}
</div>
{% endif %}

<form method="post"
      action="/usuarios/atualizar/{{usuario.id}}">

  <div class="mb-3">
    <label class="form-label"
           style="color: rgb(233, 212, 198);">
      Nome
    </label>

    <input type="text"
           name="nome"
           class="form-control"
           required
           value="{{usuario.nome}}">
  </div>

  <div class="mb-3">
    <label class="form-label"
           style="color: rgb(233, 212, 198);">
      Email
    </label>

    <input type="email"
           name="email"
           class="form-control"
           required
           value="{{usuario.email}}">
  </div>

  <div class="mb-3">
    <label class="form-label"
           style="color: rgb(233, 212, 198);">
      Nova Senha
    </label>

    <input type="password"
           name="senha"
           class="form-control">

    <small style="color: rgb(233, 212, 198);">
      Deixe vazio para manter a senha atual.
    </small>
  </div>

  <div class="mb-3">
    <label class="form-label"
           style="color: rgb(233, 212, 198);">
      Cargo
    </label>

    <select name="role"
            class="form-control"
            required>

      <option value="admin"
        {% if usuario.role == "admin" %}selected{% endif %}>
        Admin
      </option>

      <option value="atendente"
        {% if usuario.role == "atendente" %}selected{% endif %}>
        Atendente
      </option>

      <option value="cozinha"
        {% if usuario.role == "cozinha" %}selected{% endif %}>
        Cozinha
      </option>

    </select>
  </div>

  <div class="mb-3">
    <label class="form-label"
           style="color: rgb(233, 212, 198);">
      Unidade
    </label>

    <select name="unidade_id"
            class="form-control"
            required>
      {% for un in unidades %}
        <option value="{{un.id}}"
          {% if usuario.unidade_id == un.id %}selected{% endif %}>
          {{un.nome}}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="d-flex gap-2">

    <button type="submit"
            class="btn btn-success">
      Atualizar
    </button>

    <a href="/usuarios"
       class="btn btn-secondary">
      Cancelar
    </a>
  </div>
</form>

{% endblock %}
