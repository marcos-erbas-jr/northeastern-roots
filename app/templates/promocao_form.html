{% extends "base.html" %}

{% block title %}
Nova Promoção
{% endblock %}

{% block content %}

<h3>
Nova Promoção
</h3>

{% if erro %}
<div class="alert alert-danger">
    {{ erro }}
</div>
{% endif %}

<form method="post"
      action="/promocao/criar">

    <div class="mb-3">

        <label class="form-label"
               style="color: rgb(233, 212, 198);">
            Unidade
        </label>

        <select name="unidade_id"
                class="form-control"
                required>
            {% for un in unidades %}
            <option value="{{un.id}}">
                {{un.nome}}
            </option>
            {% endfor %}

        </select>

    </div>

    <div class="mb-3">
        <label class="form-label"
               style="color: rgb(233, 212, 198);">
            Prato
        </label>

        <select name="prato_id"
                class="form-control"
                required>
            {% for p in pratos %}
            <option value="{{p.id}}">
                {{p.nome}}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label"
               style="color: rgb(233, 212, 198);">
            Desconto (%)
        </label>

        <input
            type="number"
            name="desconto"
            class="form-control"
            required
            min="1"
            max="100"
            step="0.01">

    </div>

    <div class="d-flex gap-2">
        <button type="submit"class="btn btn-success">
            Criar
        </button>
        <a href="/promocao"
           class="btn btn-secondary">
            Cancelar
        </a>
    </div>
</form>
{% endblock %}
