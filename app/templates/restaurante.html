<!DOCTYPE html>
<html lang="pt-br">
      <head>
        <meta charset="UTF-8">
        <title>Restaurante</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
        <link rel="stylesheet" href="/static/css/estilo.css">
        
        
      </head>
    <body>
      <div class="d-flex flex-column align-items-center">
        <div style="width: 800px;">
          <div class="d-flex justify-content-between align-items-center mb-3">

            <h1 class="m-0">Raízes do Nordeste</h1>
            <a href="/" class="btn btn-warning">Voltar</a>
            

          </div>
        </div>
      </div>


      <div class="container">
        <div class="row">
          {% for p in pratos %}
          <div class="col-md-4 mb-4">
            <div class="card">
              <img src="/static/img/comida1.jpg" class="card-img-top">

              <div class="card-body">
                <h5 class="card-title">{{p.nome}}</h5>
                <p class="card-text">{{p.descricao}}</p>

                <button onclick="adicionarItem({{p.id}}, '{{p.nome}}', {{p.preco}})" class="btn btn-primary">
                  Adicionar
                </button>
              </div>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>

       <div class="d-flex justify-content-center mt-4">
          <div class="d-flex justify-content-between mb-3" style="color:rgb(214, 196, 184); margin-right: 3%;">
                <span id="quantidade">Quantidade: 0- </span>
                <span id="total">Total: R$ 0,00</span>
            </div>

          <button class="btn btn-success" onclick="finalizarPedido({{unidade_id}})">Pagar
          </button>
        </div>


      <script src="/static/js/carrinho.js"></script>
    </body>
</html>
